<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I'm Just a Wall</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Phaser 3 (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <!-- Socket.io client (서버가 자동으로 서빙) -->
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <!-- Phaser 캔버스가 들어갈 컨테이너 -->
  <div id="game-root"></div>

  <!-- 타이틀/로비 화면 (방 선택 전). 게임 시작 시 JS가 숨김 -->
  <div id="title-screen">
    <div class="ts-card">
      <h1 class="ts-logo">I'M JUST A WALL</h1>

      <div class="ts-step" data-step="loading">
        <p class="ts-loading">불러오는 중…</p>
      </div>

      <div class="ts-step hidden" data-step="nickname">
        <input id="ts-nick" class="ts-input" placeholder="닉네임을 입력하세요" maxlength="16" autocomplete="off" />
        <button class="ts-btn primary" data-act="set-nick">확인</button>
        <p class="ts-note">⚠ 닉네임은 한 번 정하면 바꿀 수 없어요</p>
      </div>

      <div class="ts-step hidden" data-step="main">
        <button class="ts-btn primary" data-act="create-menu">방 만들기</button>
        <button class="ts-btn" data-act="join-menu">게임 참가</button>
      </div>

      <div class="ts-step hidden" data-step="create">
        <input id="ts-roomname" class="ts-input" placeholder="방 이름" maxlength="20" autocomplete="off" />
        <div class="ts-create-grid">
          <div class="ts-opts">
            <label class="ts-opt">최대 인원<input id="ts-max" type="number" value="12" min="2" max="30" /></label>
            <label class="ts-opt">술래 인원<input id="ts-seekers" type="number" value="2" min="1" max="3" /></label>
            <label class="ts-opt">술래 대기(초)<input id="ts-swait" type="number" value="70" min="5" max="200" /></label>
            <label class="ts-opt">탐색 시간(초)<input id="ts-htime" type="number" value="200" min="30" max="600" /></label>
            <label class="ts-opt">정답 공개(초)<input id="ts-reveal" type="number" value="30" min="5" max="100" /></label>
            <label class="ts-opt">강제 휘파람(초)<input id="ts-whistle" type="number" value="30" min="10" max="100" /></label>
            <label class="ts-opt ts-opt-wide">모드<select id="ts-mode"><option value="basic">기본 - 휘파람을 참을 수 없어</option><option value="infection">감염 - 아까까진 동료였는데</option></select></label>
            <p class="ts-opt-desc" id="ts-mode-desc"></p>
          </div>
          <div class="ts-maps">
            <p class="ts-maps-title">맵 선택</p>
            <div class="ts-map selected" data-map="island">🌲<br>조용한 숲</div>
            <div class="ts-map disabled">?</div>
            <div class="ts-map disabled">?</div>
            <div class="ts-map disabled">?</div>
          </div>
        </div>
        <button class="ts-btn primary" data-act="create" data-public="1">🌐 공개 방 만들기</button>
        <button class="ts-btn" data-act="create" data-public="0">🔒 비공개 방 만들기</button>
        <button class="ts-btn ghost" data-act="back">← 뒤로</button>
      </div>

      <div class="ts-step hidden" data-step="public-list">
        <div class="ts-private-join">
          <input id="ts-code" class="ts-input" placeholder="🔒 비공개 방 코드" maxlength="12" autocomplete="off" />
          <button class="ts-btn" data-act="join-code">입장</button>
        </div>
        <div id="ts-roomlist" class="ts-roomlist"></div>
        <div class="ts-row2">
          <button class="ts-btn ghost" data-act="refresh">↻ 새로고침</button>
          <button class="ts-btn ghost" data-act="back">← 뒤로</button>
        </div>
      </div>

      <div id="ts-msg" class="ts-msg"></div>
    </div>
  </div>

  <!-- 커스텀 마우스 커서(술래=크로스헤어 / 숨는이=cursor). 캔버스·UI·셰이더 위에 항상 표시 -->
  <div id="game-cursor" aria-hidden="true"></div>
  <!-- 술래 사거리 끝 마커: 조준이 사거리 밖일 때 실제 탄착 지점(사거리 끝)에 원래 크로스헤어 표시 -->
  <div id="game-cursor-range" aria-hidden="true"></div>

  <!-- 조작 안내 HUD (역할이 정해지면 JS가 해당 역할 조작만 채움) -->
  <div id="hud" class="hud-card"></div>

  <!-- 점수판 (상단 중앙). 서버 'scores' 이벤트로 갱신 -->
  <div id="scoreboard" class="hud-card"></div>

  <!-- 방 코드 표시(게임 중 상단). JS가 채움 -->
  <div id="room-code" class="hidden"></div>

  <!-- 술래 대기(추격 시작 카운트다운) 오버레이 -->
  <div id="wait-overlay" class="hidden"></div>
  <!-- 탐색 시간 / 정답 공개 카운트다운 -->
  <div id="round-timer" class="hidden"></div>
  <!-- 강제 휘파람까지 남은 시간(숨는이) -->
  <div id="whistle-timer" class="hidden"></div>

  <!-- 방장 로비 컨트롤(방 설정 + 게임 시작) -->
  <div id="lobby-controls" class="hidden">
    <button id="settings-btn" type="button">⚙ 설정</button>
    <button id="start-btn" type="button">▶ 게임 시작</button>
  </div>

  <!-- 방 설정 모달(방장, 로비 단계) -->
  <div id="settings-modal" class="hidden">
    <div class="sm-box">
      <p class="sm-title">⚙ 방 설정</p>
      <div class="ts-create-grid">
        <div class="ts-opts">
          <label class="ts-opt">최대 인원<input id="rs-max" type="number" min="2" max="30" /></label>
          <label class="ts-opt">술래 인원<input id="rs-seekers" type="number" min="1" max="3" /></label>
          <label class="ts-opt">술래 대기(초)<input id="rs-swait" type="number" min="5" max="200" /></label>
          <label class="ts-opt">탐색 시간(초)<input id="rs-htime" type="number" min="30" max="600" /></label>
          <label class="ts-opt">정답 공개(초)<input id="rs-reveal" type="number" min="5" max="100" /></label>
          <label class="ts-opt">강제 휘파람(초)<input id="rs-whistle" type="number" min="10" max="100" /></label>
          <label class="ts-opt ts-opt-wide">모드<select id="rs-mode"><option value="basic">기본 - 휘파람을 참을 수 없어</option><option value="infection">감염 - 아까까진 동료였는데</option></select></label>
          <p class="ts-opt-desc" id="rs-mode-desc"></p>
        </div>
        <div class="ts-maps">
          <p class="ts-maps-title">맵 선택</p>
          <div class="ts-map selected" data-map="island">🌲<br>조용한 숲</div>
          <div class="ts-map disabled">?</div>
          <div class="ts-map disabled">?</div>
          <div class="ts-map disabled">?</div>
        </div>
      </div>
      <div class="cm-btns">
        <button class="ts-btn ghost" type="button" data-sm="cancel">취소</button>
        <button class="ts-btn primary" type="button" data-sm="save">저장</button>
      </div>
    </div>
  </div>

  <!-- 공통 확인 모달(게임 UI 스타일) -->
  <div id="confirm-modal" class="hidden">
    <div class="cm-box">
      <p class="cm-msg"></p>
      <div class="cm-btns">
        <button class="ts-btn ghost" type="button" data-cm="cancel">취소</button>
        <button class="ts-btn primary" type="button" data-cm="ok">확인</button>
      </div>
    </div>
  </div>

  <!-- 점수 획득 팝업 (가운데 하단, 사유+점수) -->
  <div id="score-pop" aria-hidden="true"></div>

  <!-- 역할 표시 (픽셀 HUD 카드) -->
  <div id="role-badge" class="hud-card">
    <span class="rb-icon">
      <!-- 술래: 돋보기 -->
      <svg class="ic ic-seeker" viewBox="0 0 16 16" shape-rendering="crispEdges" aria-hidden="true">
        <rect x="4" y="2" width="4" height="1"/>
        <rect x="3" y="3" width="1" height="1"/><rect x="8" y="3" width="1" height="1"/>
        <rect x="2" y="4" width="1" height="3"/><rect x="9" y="4" width="1" height="3"/>
        <rect x="3" y="7" width="1" height="1"/><rect x="8" y="7" width="1" height="1"/>
        <rect x="4" y="8" width="4" height="1"/>
        <rect x="9" y="9" width="2" height="2"/>
        <rect x="11" y="11" width="2" height="2"/>
        <rect x="12" y="12" width="2" height="2"/>
      </svg>
      <!-- 숨는이: 고양이 -->
      <svg class="ic ic-hider" viewBox="0 0 16 16" shape-rendering="crispEdges" aria-hidden="true">
        <rect x="3" y="2" width="2" height="3"/>
        <rect x="11" y="2" width="2" height="3"/>
        <rect x="3" y="5" width="10" height="7"/>
        <rect x="4" y="12" width="8" height="1"/>
        <rect x="5" y="7" width="2" height="2" fill="#11141d"/>
        <rect x="9" y="7" width="2" height="2" fill="#11141d"/>
        <rect x="7" y="9" width="2" height="1" fill="#11141d"/>
      </svg>
    </span>
    <span class="rb-text">
      <span class="rb-title">접속 중</span>
      <span class="rb-sub">잠시만요…</span>
    </span>
  </div>

  <!-- 음성채팅 컨트롤 (우하단, 호버 시 볼륨 슬라이더) -->
  <div id="voice-panel" class="hud-card off">
    <div id="voice-toast" class="vc-toast"></div>
    <button id="vc-power" class="vc-btn" type="button" title="음성채팅 참여 (B)">
      <svg viewBox="0 0 16 16" shape-rendering="crispEdges" aria-hidden="true">
        <rect x="4" y="2" width="8" height="1"/>
        <rect x="3" y="3" width="1" height="2"/><rect x="12" y="3" width="1" height="2"/>
        <rect x="2" y="5" width="2" height="6"/>
        <rect x="12" y="5" width="2" height="6"/>
        <rect x="12" y="11" width="1" height="2"/>
        <rect x="8" y="12" width="4" height="2"/>
      </svg>
    </button>
    <button id="vc-mic" class="vc-btn" type="button" title="마이크 ON/OFF (V)">
      <svg viewBox="0 0 16 16" shape-rendering="crispEdges" aria-hidden="true">
        <g class="mic-body">
          <rect x="6" y="1" width="4" height="8"/>
          <rect x="4" y="6" width="1" height="2"/>
          <rect x="11" y="6" width="1" height="2"/>
          <rect x="4" y="8" width="8" height="1"/>
          <rect x="7" y="9" width="2" height="3"/>
          <rect x="4" y="12" width="8" height="2"/>
        </g>
        <g class="mic-slash">
          <rect x="1" y="3" width="2" height="2"/>
          <rect x="3" y="5" width="2" height="2"/>
          <rect x="5" y="7" width="2" height="2"/>
          <rect x="7" y="9" width="2" height="2"/>
          <rect x="9" y="11" width="2" height="2"/>
          <rect x="11" y="13" width="2" height="2"/>
        </g>
      </svg>
    </button>
    <span id="vc-count" class="vc-count" title="참여 인원">참가자 1</span>
    <div class="vc-vol">
      <span class="vc-vol-ico">
        <svg viewBox="0 0 16 16" shape-rendering="crispEdges" aria-hidden="true">
          <rect x="2" y="6" width="2" height="4"/>
          <rect x="4" y="5" width="2" height="6"/>
          <rect x="6" y="3" width="2" height="10"/>
          <rect x="10" y="6" width="1" height="4"/>
          <rect x="12" y="4" width="1" height="8"/>
        </svg>
      </span>
      <input id="vc-volume" type="range" min="0" max="100" value="100" title="볼륨" />
    </div>
  </div>

  <!-- 채팅 (우상단). T로 입력창 열기 / Enter 전송 / Esc 취소 -->
  <div id="chat">
    <input id="chat-input" type="text" maxlength="120"
           autocomplete="off" placeholder="채팅 - T" />
    <div id="chat-log"></div>
  </div>

  <!-- =====================================================================
       [2단계] 위장 그리기 도구막대 (인게임 캐릭터 페인팅)
       Q 를 누르면 카메라가 캐릭터로 줌인되고, 캐릭터 위 격자에 직접 칠한다.
       이 막대는 색/브러시 선택과 적용/닫기 버튼만 담당한다.
  ====================================================================== -->
  <div id="paint-toolbar" class="hidden">
    <div class="pt-row">
      <div class="pt-group">
        <label id="cur-color" class="cur-color" data-tip="현재 색 · 클릭해서 색 선택">
          <input type="color" id="color-picker" value="#e23b3b" />
          <span class="cur-color-ico" aria-hidden="true">🎨</span>
        </label>
        <div class="palette" id="palette"></div>
      </div>
      <label class="pt-brush" data-tip="브러시 크기 · [ / ] 키">
        <span class="pt-ico">🖌️</span>
        <input id="brush-size" type="range" min="1" max="16" value="1" />
        <span id="brush-val" class="pt-val">1</span>
      </label>
      <div class="pt-group">
        <button id="btn-pick" class="paint-btn icon" data-tip="스포이드 · Space">💧</button>
        <button id="btn-undo" class="paint-btn icon" data-tip="되돌리기 · Z">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg>
        </button>
        <button id="btn-redo" class="paint-btn icon" data-tip="다시 · X">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M18.4 10.6C16.55 8.99 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22L3.9 16c1.05-3.19 4.05-5.5 7.6-5.5 1.95 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z"/></svg>
        </button>
      </div>
      <div class="pt-group">
        <button id="btn-clear" class="paint-btn danger" data-tip="전체 지우기">초기화</button>
        <button id="btn-close" class="paint-btn" data-tip="취소 · Esc">취소</button>
        <button id="btn-apply" class="paint-btn primary" data-tip="적용 · Q">적용</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
